name: release

# Build the NSIS installer and create a draft release when a v* tag is pushed.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      # arduino/setup-protoc は Node 20 ランタイムで非推奨警告が出るため、
      # Windows ランナー標準の Chocolatey で protoc を導入する。
      - name: Install protoc
        run: choco install protoc -y --no-progress

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm install

      - name: Build app and create release (NSIS)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false
